<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>жў…еұұзҺүиҷӣе®® иҫІж°‘жӣҶ</title>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<style>
  :root {
    --gold:      #D4A843;
    --gold-lt:   #F0C860;
    --gold-dk:   #8C6A1A;
    --bg:        #0F0D0A;
    --bg-card:   #17140E;
    --green-lt:  #5dca85;
    --green-bg:  rgba(39,174,96,0.07);
    --green-bd:  rgba(39,174,96,0.30);
    --red-lt:    #E07060;
    --red-bg:    rgba(192,57,43,0.07);
    --red-bd:    rgba(192,57,43,0.30);
    --text:      #E4D8C0;
    --muted:     #9A8060;
    --sat:       #7898d0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Microsoft JhengHei', 'еҫ®и»ҹжӯЈй»‘й«”', 'PingFang TC', sans-serif;
    background: radial-gradient(ellipse at 50% 30%, #1e180a 0%, var(--bg) 65%);
    min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px 12px 40px;
  }
  .wrapper { width: 100%; max-width: 980px; }

  /* в•җв•җ жҺ§еҲ¶еҲ— в•җв•җ */
  .ctrl-bar { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .ctrl-row1 {
    display: flex; align-items: center;
    justify-content: center; gap: 6px; flex-wrap: nowrap;
  }
  .ctrl-row2 {
    display: flex; align-items: center;
    justify-content: center; gap: 8px; flex-wrap: wrap;
  }
  .ctrl-label {
    color: var(--gold); font-size: 0.95em;
    letter-spacing: 0.05em; user-select: none; white-space: nowrap;
  }
  input[type="number"] {
    background: rgba(212,168,67,0.07);
    border: 1px solid var(--gold-dk);
    color: var(--text); font-family: inherit;
    font-size: 1em; text-align: center;
    padding: 8px 4px; outline: none;
    min-height: 44px;
    -moz-appearance: textfield;
    transition: border-color 0.2s, background 0.2s;
  }
  input[type="number"]:focus {
    border-color: var(--gold); background: rgba(212,168,67,0.13);
  }
  input::-webkit-inner-spin-button,
  input::-webkit-outer-spin-button { opacity: 1; }
  #inp-y { width: 72px; }
  #inp-m { width: 50px; }
  #inp-d { width: 50px; }
  #inp-my { width: 72px; }
  #inp-mm { width: 50px; }

  .btn {
    font-family: inherit; cursor: pointer;
    letter-spacing: 0.15em; transition: opacity 0.18s; border: none;
    min-height: 44px; display: inline-flex;
    align-items: center; justify-content: center; padding: 0 14px;
  }
  .btn:active { opacity: 0.6; }
  .btn-nav {
    background: transparent;
    border: 1px solid var(--gold-dk) !important;
    color: var(--muted); font-size: 1em;
    min-width: 44px; padding: 0 10px;
  }
  .btn-query {
    background: linear-gradient(135deg, var(--gold-dk), #A07820);
    border: 1px solid var(--gold) !important;
    color: var(--gold-lt); font-size: 1em;
    padding: 0 28px; flex: 1; max-width: 180px;
  }
  .btn-today {
    background: transparent;
    border: 1px solid rgba(212,168,67,0.3) !important;
    color: var(--muted); font-size: 0.9em; padding: 0 18px;
  }
  .btn-back {
    background: transparent;
    border: 1px solid var(--gold) !important;
    color: var(--gold-lt); font-size: 0.9em; padding: 0 18px;
  }

  /* в•җв•җ еӨ–жЎҶ в•җв•җ */
  .frame-outer {
    border: 2px solid var(--gold-dk); padding: 5px; background: var(--bg-card);
    box-shadow: 0 0 40px rgba(212,168,67,0.12), 0 20px 60px rgba(0,0,0,0.6);
  }
  .frame-inner {
    border: 1px solid rgba(212,168,67,0.35);
    padding: 28px 24px 24px; position: relative;
  }
  .frame-inner::before, .frame-inner::after,
  .corner-bl, .corner-br {
    content: ''; position: absolute;
    width: 16px; height: 16px;
    border-color: var(--gold-dk); border-style: solid;
  }
  .frame-inner::before { top: 6px; left: 6px;  border-width: 2px 0 0 2px; }
  .frame-inner::after  { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 6px; left: 6px;  border-width: 0 0 2px 2px; }
  .corner-br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

  /* в•җв•җ жЁҷйЎҢ в•җв•җ */
  .header { text-align: center; margin-bottom: 4px; overflow: hidden; }
  .temple-name {
    font-size: clamp(1.3em, 5.5vw, 2.4em);
    font-weight: 900; color: var(--gold); opacity: 0.9;
    letter-spacing: clamp(0.15em, 1.8vw, 0.8em);
    text-indent:    clamp(0.15em, 1.8vw, 0.8em);
    margin-bottom: 4px; line-height: 1.2;
    text-shadow: 0 0 20px rgba(212,168,67,0.45), 0 2px 4px rgba(0,0,0,0.5);
  }
  .page-title {
    font-size: clamp(0.82em, 3vw, 1.05em);
    font-weight: 400; color: var(--gold-dk);
    letter-spacing: clamp(0.05em, 1vw, 0.3em);
    text-indent:    clamp(0.05em, 1vw, 0.3em);
    line-height: 1.2; margin-top: 5px;
  }

  /* еҲҶйҡ”з·ҡ */
  .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dk), transparent);
  }
  .divider span { color: var(--gold); font-size: 1.05em; opacity: 0.8; }

  /* в•җв•җ ж—ҘжӘўиҰ–пјҡж—ҘжңҹеҚҖ в•җв•җ */
  .date-block {
    background: rgba(212,168,67,0.05);
    border: 1px solid rgba(212,168,67,0.15);
    padding: 14px 16px; margin-bottom: 12px; text-align: center;
  }
  .date-solar-main {
    font-size: clamp(1.1em, 4.5vw, 1.55em);
    color: var(--text); letter-spacing: 0.04em; margin-bottom: 5px;
  }
  .date-sub {
    font-size: clamp(0.78em, 3vw, 0.9em);
    color: var(--muted); letter-spacing: 0.15em; margin-bottom: 8px;
  }
  .weekday-tag {
    display: inline-block; margin-left: 10px;
    padding: 1px 8px; border: 1px solid rgba(212,168,67,0.3); font-size: 0.95em;
  }
  .date-lunar {
    font-size: clamp(0.9em, 3.5vw, 1.05em);
    color: var(--gold); letter-spacing: 0.35em; text-indent: 0.35em;
  }

  .chong-sha {
    text-align: center; color: var(--muted);
    font-size: clamp(0.82em, 3vw, 0.92em);
    letter-spacing: 0.25em; padding: 8px 0; margin-bottom: 18px;
    border-top: 1px dashed rgba(154,128,96,0.25);
    border-bottom: 1px dashed rgba(154,128,96,0.25);
  }
  .chong-sha em { font-style: normal; color: #c09060; }

  .yi-ji { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 6px; }
  .section { padding: 14px 12px; display: flex; flex-direction: column; gap: 12px; }
  .section.yi { background: var(--green-bg); border: 1px solid var(--green-bd); }
  .section.ji { background: var(--red-bg);   border: 1px solid var(--red-bd); }
  .section-head {
    font-size: clamp(1.1em, 4vw, 1.45em); font-weight: bold;
    text-align: center; padding-bottom: 8px;
    letter-spacing: 0.5em; text-indent: 0.5em;
  }
  .yi .section-head { color: var(--green-lt); border-bottom: 1px solid var(--green-bd); }
  .ji .section-head { color: var(--red-lt);   border-bottom: 1px solid var(--red-bd); }

  .tags { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .tags li {
    padding: 4px 10px; font-size: clamp(0.78em, 2.8vw, 0.88em);
    letter-spacing: 0.04em; cursor: default; transition: opacity 0.2s;
  }
  .tags li:active { opacity: 0.6; }
  .yi .tags li { background: rgba(39,174,96,0.12); color: var(--green-lt); border: 1px solid rgba(39,174,96,0.22); }
  .ji .tags li { background: rgba(192,57,43,0.12); color: var(--red-lt);   border: 1px solid rgba(192,57,43,0.22); }

  /* в•җв•җ жңҲжӘўиҰ–пјҡж јеӯҗжңҲжӣҶпјҲжЎҢж©ҹпјүв•җв•җ */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-list  { display: none; }

  .dh {
    text-align: center; padding: 6px 2px;
    font-size: 0.8em; font-weight: bold;
    color: var(--muted); letter-spacing: 0.1em;
    border-bottom: 1px solid rgba(212,168,67,0.15);
    margin-bottom: 2px;
  }
  .dh-sun { color: var(--red-lt) !important; }
  .dh-sat { color: var(--sat) !important; }

  .cell {
    min-height: 128px;
    padding: 6px 5px 4px;
    border: 1px solid rgba(212,168,67,0.07);
    background: rgba(255,255,255,0.012);
    display: flex; flex-direction: column; gap: 3px;
    overflow: hidden; cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  .cell:hover  { background: rgba(212,168,67,0.06); border-color: rgba(212,168,67,0.25); }
  .cell:active { opacity: 0.7; }
  .cell.empty  { border: none; background: none; cursor: default; }
  .cell.empty:hover { background: none; border-color: transparent; }
  .cell.today  { border-color: rgba(212,168,67,0.55) !important; background: rgba(212,168,67,0.09) !important; }
  .cell.sun .ct b { color: #e07878; }
  .cell.sat .ct b { color: var(--sat); }

  .ct { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .ct b  { font-size: 1.22em; color: var(--text); line-height: 1; }
  .ct em { font-size: 0.66em; color: var(--muted); font-style: normal; }
  .cell.today .ct em { color: var(--gold); }

  .cy, .cj { display: flex; flex-wrap: wrap; gap: 2px; }

  .ty, .tj, .tm {
    font-size: 0.6em; padding: 1px 4px; line-height: 1.6;
    display: inline-block;
  }
  .ty { background: var(--green-bg); color: var(--green-lt); border: 1px solid var(--green-bd); }
  .tj { background: var(--red-bg);   color: var(--red-lt);   border: 1px solid var(--red-bd);   }
  .tm { color: var(--muted); }

  /* жңҲжӘўиҰ–пјҡжё…е–®пјҲжүӢж©ҹпјү */
  .li {
    display: flex; gap: 10px;
    border: 1px solid rgba(212,168,67,0.12);
    background: rgba(255,255,255,0.018);
    padding: 10px 11px; cursor: pointer; transition: background 0.15s;
  }
  .li:active { opacity: 0.7; }
  .li.today {
    border-color: rgba(212,168,67,0.48);
    background: rgba(212,168,67,0.07);
  }
  .ld {
    min-width: 58px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 3px;
    border-right: 1px solid rgba(212,168,67,0.12);
    padding-right: 10px;
    justify-content: center;
  }
  .ls     { font-size: 1.1em; font-weight: bold; color: var(--text); }
  .ls-sun { color: var(--red-lt); }
  .ls-sat { color: var(--sat); }
  .lw { font-size: 0.72em; color: var(--muted); }
  .ll { font-size: 0.75em; color: var(--gold); }

  .lr { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .lyi, .lji {
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  }
  .lyi::before {
    content: 'е®ң'; font-size: 0.72em; font-weight: bold;
    color: var(--green-lt); flex-shrink: 0;
  }
  .lji::before {
    content: 'еҝҢ'; font-size: 0.72em; font-weight: bold;
    color: var(--red-lt); flex-shrink: 0;
  }
  .lyi .ty, .lji .tj {
    font-size: 0.76em; padding: 2px 7px;
  }

  /* й Ғе°ҫ */
  .footer {
    text-align: center; color: var(--gold-dk);
    font-size: clamp(0.72em, 2.5vw, 0.82em);
    letter-spacing: 0.4em; text-indent: 0.4em;
    padding-top: 14px; border-top: 1px solid rgba(140,106,26,0.35); opacity: 0.85;
    margin-top: 18px;
  }
  .err-msg { text-align: center; color: var(--red-lt); padding: 24px; letter-spacing: 0.1em; }

  /* в•җв•җ жүӢж©ҹж–·й»һ вүӨ 640pxпјҡжңҲжӘўиҰ–ж”№жё…е–® в•җв•җ */
  @media (max-width: 640px) {
    .cal-grid { display: none; }
    .cal-list { display: flex; flex-direction: column; gap: 7px; }
  }

  /* в•җв•җ жүӢж©ҹж–·й»һ вүӨ 480px в•җв•җ */
  @media (max-width: 480px) {
    body { padding: 12px 8px 32px; }
    .frame-inner { padding: 20px 12px 18px; }
    .yi-ji { grid-template-columns: 1fr; gap: 10px; }
    #inp-y, #inp-my { width: 66px; }
    #inp-m, #inp-d, #inp-mm { width: 46px; }
  }
  @media (max-width: 360px) {
    .corner-bl, .corner-br { display: none; }
    .frame-inner::before, .frame-inner::after { display: none; }
  }
</style>
</head>

<div class="wrapper">

  <!-- жңҲжӘўиҰ–жҺ§еҲ¶еҲ— -->
  <div class="ctrl-bar" id="ctrl-month">
    <div class="ctrl-row1">
      <button class="btn btn-nav" id="btn-mprev">&#9664;</button>

  <!-- дё»жЎҶ -->
  <div class="frame-outer">

      <div class="corner-bl"></div>

      <div class="header">
        <div class="temple-name">жў…еұұзҺүиҷӣе®®</div>
        <div class="page-title" id="page-title">жҜҸж—Ҙж“Үж—ҘзёҪиҰҪ</div>
      </div>

      <div class="divider"><span>вңҰ</span></div>

      <!-- жңҲжӘўиҰ–е…§е®№ -->
      <div id="view-month">
        <div class="cal-grid" id="cal-grid">
          <div class="dh dh-sun">ж—Ҙ</div>
          <div class="dh">дёҖ</div>
          <div class="dh">дәҢ</div>
          <div class="dh">дёү</div>
          <div class="dh">еӣӣ</div>
          <div class="dh">дә”</div>
          <div class="dh dh-sat">е…ӯ</div>
        </div>
        <div class="cal-list" id="cal-list"></div>
      </div>

      <!-- ж—ҘжӘўиҰ–е…§е®№ -->
      <div id="view-day" style="display:none;">
        <div id="result"></div>
      </div>

      <div class="footer">йЎҳзҘһжҳҺдҝқдҪ‘ &ensp; и«ёдәӢй ҶйҒӮ &ensp; е№іе®үеҗүзҘҘ</div>
    </div>
  </div>

</div>

  'ејҖжё ':'й–Ӣжё ','ејҖи·Ҝ':'й–Ӣи·Ҝ','дҝ®еқҹ':'дҝ®еўі','з«Ӣзў‘':'з«Ӣзў‘',
  'еҗҜй’»':'е•ҹй‘Ҫ','и°ўеңҹ':'и¬қеңҹ','ејҖеҹә':'й–Ӣеҹә','е®ҡзЈү':'е®ҡзЈү',
  'жһ¶й©¬':'жһ¶йҰ¬','з©ҝдә•':'з©ҝдә•','й—®еҚң':'е•ҸеҚң','жұӮеҢ»':'жұӮйҶ«',
  'жІ»з—…':'жІ»з—…','й’ҲзҒё':'йҮқзҒё',
};
const CHAR_MAP = {
  'дёң':'жқұ','ејҖ':'й–Ӣ','зәі':'зҙҚ','еҠЁ':'еӢ•','з»“':'зөҗ',
  'з»Ҹ':'з¶“','дјҡ':'жңғ','дәІ':'иҰӘ','е…»':'йӨҠ','жЎҘ':'ж©Ӣ',
  'иҜҚ':'и©һ','й—Ё':'й–Җ','еҺ•':'е»Ғ','зҪ‘':'з¶І','з»ң':'зөЎ',
  'йҫҷ':'йҫҚ','й©¬':'йҰ¬','йёЎ':'йӣһ','зҢӘ':'иұ¬','жү«':'жҺғ',
  'жҢӮ':'жҺӣ','з«–':'иұҺ','еёҗ':'еёі','д»“':'еҖү','й—®':'е•Ҹ',
  'и®ў':'иЁӮ','жңә':'ж©ҹ','еӨҙ':'й ӯ','йұј':'йӯҡ','жҚҹ':'жҗҚ',
  'еҜј':'е°Һ','зЎҖ':'зӨҺ','еқҸ':'еЈһ','зҢҺ':'зҚө',
  'еқҹ':'еўі','й’»':'й‘Ҫ','еҢ»':'йҶ«','й’Ҳ':'йҮқ','зҒё':'зҒё',
  'иЎҘ':'иЈң','зјқ':'зё«','з»Ү':'з№”','з»Ј':'з№Ў','зә«':'зҙү',
  'зӮү':'зҲҗ','зҒ¶':'зҒ¶',
};
const SHA_MAP       = {'дёң':'жқұ','иҘҝ':'иҘҝ','еҚ—':'еҚ—','еҢ—':'еҢ—'};
const SHENGXIAO_MAP = {'йёЎ':'йӣһ','йҫҷ':'йҫҚ','й©¬':'йҰ¬','зҢӘ':'иұ¬'};
const WEEKDAYS      = ['дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','ж—Ҙ'];

function toTrad(list) {
  return list.map(s => PHRASE_MAP[s] ?? [...s].map(c => CHAR_MAP[c]??c).join(''));
}
function shaTrad(s)  { return [...s].map(c => SHA_MAP[c]??c).join(''); }
function sxTrad(s)   { return SHENGXIAO_MAP[s] ?? s; }

function weekdayStr(y, m, d) {
  const dt = new Date(0);
  dt.setFullYear(y, m - 1, d);
  return WEEKDAYS[(dt.getDay() + 6) % 7];
}
function minguoStr(y) {
  const r = y - 1911;
  return r > 0 ? 'ж°‘еңӢ ' + r + ' е№ҙ' : r === 0 ? 'ж°‘еңӢе…ғе№ҙ' : 'ж°‘еүҚ ' + (-r) + ' е№ҙ';
}
function isToday(y, m, d) {
  const t = new Date();
  return y === t.getFullYear() && m === t.getMonth() + 1 && d === t.getDate();
}
function lunarDayLabel(lunar) {
  const dc = lunar.getDayInChinese();
  return dc === 'еҲқдёҖ' ? (lunar.getMonthInChinese() + 'жңҲ') : dc;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ ж—ҘжӘўиҰ– в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function renderDay(y, m, d) {
  const el = document.getElementById('result');
  try {
    const solar = Solar.fromYmd(y, m, d);
    const lunar = solar.getLunar();
    const yi    = toTrad(lunar.getDayYi());
    const ji    = toTrad(lunar.getDayJi());
    const yiHtml = yi.map(t=>'<li>'+t+'</li>').join('') || '<li>пјҲз„Ўпјү</li>';
    const jiHtml = ji.map(t=>'<li>'+t+'</li>').join('') || '<li>пјҲз„Ўпјү</li>';

    el.innerHTML =
      '<div class="date-block">' +
        '<div class="date-solar-main">' + y + ' е№ҙ ' + m + ' жңҲ ' + d + ' ж—Ҙ</div>' +
        '<div class="date-sub">' +
          minguoStr(y) +
          '<span class="weekday-tag">йҖұ' + weekdayStr(y,m,d) + '</span>' +
        '</div>' +
        '<div class="date-lunar">' +
          lunar.getYearInGanZhi() + 'е№ҙ &ensp; ' +
          lunar.getMonthInChinese() + 'жңҲ &ensp; ' +
          lunar.getDayInChinese() +
        '</div>' +
      '</div>' +
      '<div class="chong-sha">жІ– <em>' + sxTrad(lunar.getChong()) + '</em> &emsp;пҪң&emsp; з…һ <em>' + shaTrad(lunar.getSha()) + '</em></div>' +
      '<div class="yi-ji">' +
        '<div class="section yi"><div class="section-head">е®ң</div><ul class="tags">' + yiHtml + '</ul></div>' +
        '<div class="section ji"><div class="section-head">еҝҢ</div><ul class="tags">' + jiHtml + '</ul></div>' +
      '</div>';
  } catch(e) {
    el.innerHTML = '<div class="err-msg">вҡ  жҹҘи©ўеӨұж•—пјҡ' + e.message + '</div>';
  }
}

const $y = () => document.getElementById('inp-y');
const $m = () => document.getElementById('inp-m');
const $d = () => document.getElementById('inp-d');

function getYMD() {
  return { y: parseInt($y().value), m: parseInt($m().value), d: parseInt($d().value) };
}
function setYMD(y, m, d) { $y().value=y; $m().value=m; $d().value=d; }

function queryDay() {
  const {y,m,d} = getYMD();
  if (!y||!m||!d||m<1||m>12||d<1||d>31) {
    document.getElementById('result').innerHTML = '<div class="err-msg">и«Ӣијёе…Ҙжңүж•Ҳзҡ„е№ҙгҖҒжңҲгҖҒж—Ҙ</div>';
    return;
  }
  renderDay(y, m, d);
}

function setTodayDay() {
  const t = new Date();
  setYMD(t.getFullYear(), t.getMonth()+1, t.getDate());
  queryDay();
}

function shiftDay(delta) {
  const {y,m,d} = getYMD();
  if (!y||!m||!d) return;
  const dt = new Date(0);
  dt.setFullYear(y, m-1, d+delta);
  setYMD(dt.getFullYear(), dt.getMonth()+1, dt.getDate());
  queryDay();
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ жңҲжӘўиҰ– в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
let curMonthY, curMonthM;   // зӣ®еүҚжңҲжӘўиҰ–жүҖеңЁзҡ„е№ҙпјҸжңҲпјҢдҫӣгҖҢиҝ”еӣһжңҲжӣҶгҖҚдҪҝз”Ё

function buildDayTags(list, cls, maxShow) {
  if (!list.length) return '<span class="' + cls + '">з„Ў</span>';
  const shown = list.slice(0, maxShow).map(t => '<span class="'+cls+'">'+t+'</span>').join('');
  const rest  = list.length - maxShow;
  return shown + (rest > 0 ? '<span class="tm">+'+rest+'</span>' : '');
}

function renderMonth(y, m) {
  curMonthY = y; curMonthM = m;

  const firstDate   = new Date(0); firstDate.setFullYear(y, m-1, 1);
  const firstDow    = firstDate.getDay();               // 0=ж—Ҙ ... 6=е…ӯ
  const daysInMonth = new Date(y, m, 0).getDate();

  const gridEl = document.getElementById('cal-grid');
  const listEl = document.getElementById('cal-list');

  // з§»йҷӨиҲҠзҡ„ж—Ҙжңҹж јпјҲдҝқз•ҷжҳҹжңҹжЁҷй ӯ 7 ж јпјү
  while (gridEl.children.length > 7) gridEl.removeChild(gridEl.lastChild);

  let gridHtml = '';
  for (let i = 0; i < firstDow; i++) gridHtml += '<div class="cell empty"></div>';

  let listHtml = '';

  for (let d = 1; d <= daysInMonth; d++) {
    let yi = [], ji = [], lunarLabel = '', dow = 0, today = false;
    try {
      const solar = Solar.fromYmd(y, m, d);
      const lunar = solar.getLunar();
      yi = toTrad(lunar.getDayYi());
      ji = toTrad(lunar.getDayJi());
      lunarLabel = lunarDayLabel(lunar);
    } catch(e) { lunarLabel = ''; }
    const dt = new Date(0); dt.setFullYear(y, m-1, d);
    dow = dt.getDay();
    today = isToday(y, m, d);

    const dowCls = dow === 0 ? ' sun' : (dow === 6 ? ' sat' : '');
    const todayCls = today ? ' today' : '';

    gridHtml +=
      '<div class="cell'+dowCls+todayCls+'" onclick="showDayView('+y+','+m+','+d+')">' +
        '<div class="ct"><b>'+d+'</b><em>'+lunarLabel+'</em></div>' +
        '<div class="cy">'+buildDayTags(yi,'ty',4)+'</div>' +
        '<div class="cj">'+buildDayTags(ji,'tj',3)+'</div>' +
      '</div>';

    const lsCls = dow === 0 ? ' ls-sun' : (dow === 6 ? ' ls-sat' : '');
    const yiHtml = yi.map(t=>'<span class="ty">'+t+'</span>').join('') || '<span class="ty">з„Ў</span>';
    const jiHtml = ji.map(t=>'<span class="tj">'+t+'</span>').join('') || '<span class="tj">з„Ў</span>';

    listHtml +=
      '<div class="li'+todayCls+'" onclick="showDayView('+y+','+m+','+d+')">' +
        '<div class="ld">' +
          '<span class="ls'+lsCls+'">'+m+'/'+d+'</span>' +
          '<span class="lw">йҖұ'+weekdayStr(y,m,d)+'</span>' +
          '<span class="ll">'+lunarLabel+'</span>' +
        '</div>' +
        '<div class="lr">' +
          '<div class="lyi">'+yiHtml+'</div>' +
          '<div class="lji">'+jiHtml+'</div>' +
        '</div>' +
      '</div>';
  }

  gridEl.insertAdjacentHTML('beforeend', gridHtml);
  listEl.innerHTML = listHtml;

  document.getElementById('page-title').textContent =
    y + ' е№ҙ ' + m + ' жңҲ пҪң ' + minguoStr(y) + ' пҪң жҜҸж—Ҙж“Үж—ҘзёҪиҰҪ';
}

const $my = () => document.getElementById('inp-my');
const $mm = () => document.getElementById('inp-mm');

function queryMonth() {
  const y = parseInt($my().value), m = parseInt($mm().value);
  if (!y||!m||m<1||m>12) {
    alert('и«Ӣијёе…Ҙжңүж•Ҳзҡ„е№ҙгҖҒжңҲ');
    return;
  }
  renderMonth(y, m);
}

function shiftMonth(delta) {
  let y = parseInt($my().value), m = parseInt($mm().value);
  if (!y||!m) return;
  m += delta;
  if (m > 12) { m = 1; y++; }
  if (m < 1)  { m = 12; y--; }
  $my().value = y; $mm().value = m;
  renderMonth(y, m);
}

function setTodayMonth() {
  const t = new Date();
  $my().value = t.getFullYear();
  $mm().value = t.getMonth()+1;
  renderMonth(t.getFullYear(), t.getMonth()+1);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ жӘўиҰ–еҲҮжҸӣ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function showMonthView(y, m) {
  document.getElementById('ctrl-month').style.display = '';
  document.getElementById('ctrl-day').style.display   = 'none';
  document.getElementById('view-month').style.display = '';
  document.getElementById('view-day').style.display   = 'none';
  $my().value = y; $mm().value = m;
  renderMonth(y, m);
}

function showDayView(y, m, d) {
  document.getElementById('ctrl-month').style.display = 'none';
  document.getElementById('ctrl-day').style.display   = '';
  document.getElementById('view-month').style.display = 'none';
  document.getElementById('view-day').style.display   = '';
  setYMD(y, m, d);
  document.getElementById('page-title').textContent = 'жҜҸж—Ҙж“Үж—Ҙ';
  renderDay(y, m, d);
}

function backToMonth() {
  showMonthView(curMonthY, curMonthM);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ дәӢд»¶з¶Ғе®ҡ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
document.getElementById('btn-mq').addEventListener('click', queryMonth);
document.getElementById('btn-mtd').addEventListener('click', setTodayMonth);
document.getElementById('btn-mprev').addEventListener('click', function(){ shiftMonth(-1); });
document.getElementById('btn-mnext').addEventListener('click', function(){ shiftMonth(1); });

document.getElementById('btn-q').addEventListener('click', queryDay);
document.getElementById('btn-td').addEventListener('click', setTodayDay);
document.getElementById('btn-prev').addEventListener('click', function(){ shiftDay(-1); });
document.getElementById('btn-next').addEventListener('click', function(){ shiftDay(1); });
document.getElementById('btn-back').addEventListener('click', backToMonth);

document.addEventListener('keydown', function(e){
  if (e.key !== 'Enter') return;
  if (document.getElementById('view-day').style.display !== 'none') queryDay();
  else queryMonth();
});

/* в”Җв”Җ жүӢж©ҹе·ҰеҸіж»‘еӢ•жҸӣж—ҘпјҲеғ…ж—ҘжӘўиҰ–е•ҹз”Ёпјү в”Җв”Җ */
var _tx = null;
document.addEventListener('touchstart', function(e){ _tx = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', function(e) {
  if (_tx === null) return;
  var dx = e.changedTouches[0].clientX - _tx;
  _tx = null;
  if (Math.abs(dx) < 50) return;
  if (document.getElementById('view-day').style.display === 'none') return; // жңҲжӘўиҰ–дёҚе•ҹз”Ёж»‘еӢ•жҸӣж—Ҙ
  shiftDay(dx < 0 ? 1 : -1);
}, {passive:true});

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ еҲқе§ӢеҢ–пјҡй җиЁӯй–Ӣе•ҹжң¬жңҲжңҲжӣҶ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
window.addEventListener('load', function () {
  const t = new Date();
  setYMD(t.getFullYear(), t.getMonth()+1, t.getDate()); // ж—ҘжӘўиҰ–жҺ§еҲ¶еҲ—е…Ҳй җеӮҷеҘҪд»Ҡж—Ҙ
  showMonthView(t.getFullYear(), t.getMonth()+1);
});
</script>
